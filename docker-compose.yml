x-common-env: &common-env
  PYTHONUNBUFFERED: '1'
  APP_ENV: development

services:

  api:
    build: { context: ., target: runtime }
    command: >
      sh -c '/app/.venv/bin/python -m alembic upgrade head &&
      /app/.venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload'
    ports: ['8000:8000']
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://sentinel:dev@postgres:5432/sentinellayer
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    env_file: [.env]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      kafka:    { condition: service_healthy }
    volumes:
      - ./app:/app/app
      - ./kafka:/app/kafka
      - /app/.venv
    networks: [sentinel_net]
    deploy:
      resources: { limits: { memory: 512M } }

  worker:
    build: { context: ., target: runtime }
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://sentinel:dev@postgres:5432/sentinellayer
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    env_file: [.env]
    depends_on:
      api: { condition: service_started }
    volumes:
      - /app/.venv
    networks: [sentinel_net]
    deploy:
      resources: { limits: { memory: 256M } }

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentinellayer
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: dev
    ports: ['5432:5432']
    volumes: [pg_data:/var/lib/postgresql/data]
    networks: [sentinel_net]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sentinel -d sentinellayer']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports: ['6379:6379']
    volumes: [redis_data:/data]
    networks: [sentinel_net]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment: { ZOOKEEPER_CLIENT_PORT: 2181 }
    networks: [sentinel_net]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on: [zookeeper]
    ports: ['9092:9092']
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks: [sentinel_net]
    healthcheck:
      test: ['CMD', 'kafka-broker-api-versions', '--bootstrap-server', 'localhost:9092']
      interval: 10s
      retries: 10

volumes:
  pg_data:
  redis_data:

networks:
  sentinel_net:
    driver: bridge
