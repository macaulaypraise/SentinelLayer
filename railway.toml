[build]
builder = "DOCKERFILE"

[deploy]
startCommand = "sh -c \"alembic upgrade head && gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 60\""
healthcheckPath = "/health"
healthcheckTimeout = 300.0
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3.0
