name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
env:
  PYTHON_VERSION: '3.12'
jobs:
  backend:
    name: Backend - Lint, Type-check, Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sentinel_test
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5
        ports: ['5432:5432']
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: '0.9.x'
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Lint (ruff)
        run: uv run ruff check app/ tests/
      - name: Format check (ruff)
        run: uv run ruff format --check app/ tests/
      - name: Type check (mypy)
        run: uv run mypy app/
      - name: Security scan (bandit)
        run: uv run bandit -r app/ -ll -q
      - name: Run database migrations
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://sentinel:test@localhost:5432/sentinel_test
      - name: Run tests with coverage
        run: uv run pytest --cov=app --cov-report=xml -q
        env:
          DATABASE_URL: postgresql+asyncpg://sentinel:test@localhost:5432/sentinel_test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          APP_ENV: test
          NAC_CLIENT_ID: test
          NAC_CLIENT_SECRET: test
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  frontend:
    name: Frontend Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build
